<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ice Cream Quiz Game</title>
<style>
  :root {
    --bg: #FCE9D8;
    --panel: #FFF6EC;
    --cone: #E8A85C;
    --cone-dark: #C97F2E;
    --scoop: #F8B7C7;
    --scoop-dark: #E08FA6;
    --accent: #4FB6A9;
    --accent-dark: #2F8F84;
    --text: #5A3A2A;
    --correct: #6CBF6C;
    --wrong: #E2685A;
    --shadow: rgba(90, 58, 42, 0.18);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #FDEFE0 0%, #FBE2CB 100%);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* ---------- Main game area: ~70% of the viewport, responsive ---------- */
  .game-container {
    width: 70vw;
    min-width: 280px;
    max-width: 1400px;
    min-height: 70vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding: clamp(12px, 2vw, 32px);
    box-sizing: border-box;
  }

  h1 {
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    margin: 12px 0 4px;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 var(--shadow);
    text-align: center;
  }

  .subtitle {
    margin: 0 0 24px;
    font-size: clamp(0.85rem, 1.5vw, 1.05rem);
    opacity: 0.75;
    text-align: center;
  }

  /* ---------- Cone Grid ---------- */
  .cone-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(clamp(56px, 8vw, 90px), 1fr));
    gap: clamp(8px, 1.5vw, 14px);
    width: 100%;
  }

  .cone-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px;
    transition: transform 0.15s ease;
    position: relative;
  }

  .cone-btn:hover:not(:disabled) {
    transform: translateY(-4px) scale(1.05);
  }

  .cone-btn:disabled {
    opacity: 0.35;
    cursor: default;
    transform: none;
  }

  .cone-svg {
    width: 100%;
    height: auto;
    aspect-ratio: 64 / 80;
    filter: drop-shadow(0 4px 4px var(--shadow));
  }

  .cone-number {
    margin-top: 4px;
    font-weight: bold;
    font-size: clamp(0.8rem, 1.2vw, 1rem);
  }

  /* ---------- Modal / Overlay ---------- */
  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(60, 35, 20, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 50;
  }

  .overlay.hidden { display: none; }

  .modal {
    background: var(--panel);
    border-radius: 24px;
    max-width: min(760px, 85vw);
    width: 100%;
    padding: clamp(24px, 4vw, 44px) clamp(24px, 4vw, 44px) clamp(20px, 3.5vw, 36px);
    box-shadow: 0 12px 0 var(--shadow);
    text-align: center;
    animation: pop-in 0.25s ease;
  }

  @keyframes pop-in {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .modal h2 {
    margin-top: 0;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    color: var(--accent-dark);
  }

  .question-text {
    font-size: clamp(1.3rem, 3vw, 1.9rem);
    line-height: 1.5;
    margin: 16px 0 30px;
    white-space: pre-wrap;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ---------- Suggested Words ---------- */
  .word-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 0 0 28px;
  }

  .word-chip {
    background: var(--scoop);
    color: var(--text);
    border: 2px solid var(--scoop-dark);
    border-radius: 999px;
    padding: 10px 22px;
    font-weight: bold;
    font-size: clamp(1.1rem, 2.2vw, 1.5rem);
  }

  .judge-prompt {
    font-size: clamp(1rem, 1.8vw, 1.3rem);
    opacity: 0.75;
    margin: 0 0 20px;
  }

  .judge-buttons {
    display: flex;
    gap: 16px;
  }

  .judge-btn {
    flex: 1;
    border: none;
    border-radius: 14px;
    padding: clamp(16px, 2.5vw, 24px) clamp(16px, 2.5vw, 24px);
    font-size: clamp(1.2rem, 2.4vw, 1.6rem);
    font-weight: bold;
    cursor: pointer;
    color: white;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .judge-btn:active {
    transform: translateY(3px);
    box-shadow: none !important;
  }

  .judge-btn.correct-btn {
    background: var(--correct);
    box-shadow: 0 4px 0 #4f9e4f;
  }

  .judge-btn.wrong-btn {
    background: var(--wrong);
    box-shadow: 0 4px 0 #b94a3e;
  }


  .choice-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    padding: clamp(10px, 1.6vw, 14px) clamp(12px, 2vw, 18px);
    font-size: clamp(0.9rem, 1.4vw, 1rem);
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--accent-dark);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .choice-btn:hover {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--accent-dark);
  }

  .choice-btn:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 var(--accent-dark);
  }

  .choice-btn.correct {
    background: var(--correct);
    box-shadow: 0 4px 0 #4f9e4f;
  }

  .choice-btn.wrong {
    background: var(--wrong);
    box-shadow: 0 4px 0 #b94a3e;
  }

  .choice-btn:disabled {
    cursor: default;
  }

  .continue-btn {
    margin-top: 18px;
    background: var(--cone);
    color: var(--text);
    border: none;
    border-radius: 14px;
    padding: clamp(14px, 2.2vw, 20px) clamp(24px, 3.5vw, 36px);
    font-size: clamp(1rem, 2vw, 1.3rem);
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--cone-dark);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .continue-btn:hover {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--cone-dark);
  }

  /* ---------- Result Screen ---------- */
  .result-modal {
    padding: 0;
    overflow: hidden;
    max-width: min(700px, 85vw);
  }

  .result-image {
    width: 100%;
    display: block;
  }

  .result-image-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    background: repeating-linear-gradient(45deg, #f3d9bf, #f3d9bf 12px, #f7e6d4 12px, #f7e6d4 24px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: bold;
    color: var(--cone-dark);
    text-align: center;
    padding: 20px;
  }

  .result-footer {
    padding: clamp(18px, 3vw, 28px);
  }

  /* ---------- Footer / Progress ---------- */
  .progress {
    margin-top: 28px;
    font-size: 0.95rem;
    opacity: 0.8;
  }

  .reset-btn {
    margin-top: 12px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent-dark);
    border-radius: 12px;
    padding: 8px 18px;
    font-weight: bold;
    cursor: pointer;
  }

  .reset-btn:hover {
    background: var(--accent);
    color: white;
  }
</style>
</head>
<body>

<div class="game-container">
  <h1>🍦 Ice Cream Quiz Game 🍦</h1>
  <p class="subtitle">Pick a cone, answer the question, and see what you get!</p>

  <div class="cone-grid" id="coneGrid"></div>

  <div class="progress" id="progress">0 / 26 cones answered</div>
  <button class="reset-btn" id="resetBtn">Reset Game</button>
</div>

<!-- Question Modal -->
<div class="overlay hidden" id="questionOverlay">
  <div class="modal">
    <h2 id="questionConeLabel">Cone #</h2>
    <div class="question-text" id="questionText"></div>
    <div class="word-list" id="wordList"></div>
    <p class="judge-prompt">Did the player use one of these words to make the sentence more interesting?</p>
    <div class="judge-buttons">
      <button class="judge-btn correct-btn" id="judgeCorrectBtn">✅ Correct</button>
      <button class="judge-btn wrong-btn" id="judgeWrongBtn">❌ Not Quite</button>
    </div>
  </div>
</div>

<!-- Result Modal -->
<div class="overlay hidden" id="resultOverlay">
  <div class="modal result-modal">
    <div id="resultImageContainer"></div>
    <div class="result-footer">
      <button class="continue-btn" id="resultCloseBtn">Back to Cones</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   QUESTION DATA
   - Each entry: { question: "boring sentence", words: [4 suggested words] }
   - The host reads the sentence aloud, the player suggests a word
     to make it more interesting, and the host judges the answer
     using the Correct / Not Quite buttons.
   ========================================================= */
const QUESTIONS = [
  { question: `I saw a dog.`, words: ["big", "fluffy", "fast", "brown"] },
  { question: `I ate rice.`, words: ["hot", "sticky", "yummy", "white"] },
  { question: `I have a bag.`, words: ["red", "heavy", "small", "new"] },
  { question: `The cat ran.`, words: ["tiny", "fast", "black", "scared"] },
  { question: `I drew a picture.`, words: ["colorful", "big", "funny", "bright"] },
  { question: `The robot moved.`, words: ["shiny", "slow", "round", "loud"] },
  { question: `I saw a bird.`, words: ["tiny", "blue", "noisy", "fast"] },
  { question: `The food smelled.`, words: ["spicy", "sweet", "strange", "yummy"] },
  { question: `I made a hat.`, words: ["tall", "soft", "colorful", "silly"] },
  { question: `The dragon flew.`, words: ["giant", "scary", "green", "fast"] },
  { question: `I found a box.`, words: ["old", "heavy", "dusty", "big"] },
  { question: `The water was cold.`, words: ["icy", "clear", "deep", "fast"] },
  { question: `I wore shoes.`, words: ["shiny", "new", "big", "comfy"] },
  { question: `The painting moved.`, words: ["magical", "old", "colorful", "strange"] },
  { question: `I ate a snack.`, words: ["crunchy", "sweet", "salty", "tiny"] },
  { question: `The car stopped.`, words: ["red", "fast", "loud", "shiny"] },
  { question: `I saw a turtle.`, words: ["slow", "green", "old", "calm"] },
  { question: `The hero jumped.`, words: ["brave", "tall", "strong", "fast"] },
  { question: `I held a flower.`, words: ["pretty", "soft", "colorful", "tiny"] },
  { question: `The music played.`, words: ["loud", "fast", "happy", "strange"] },
  { question: `I built a tower.`, words: ["tall", "wobbly", "colorful", "tiny"] },
  { question: `The fire burned.`, words: ["hot", "bright", "scary", "orange"] },
  { question: `I saw a fish.`, words: ["shiny", "tiny", "fast", "blue"] },
  { question: `The wind blew.`, words: ["cold", "strong", "noisy", "fast"] },
  { question: `I packed a lunch.`, words: ["yummy", "healthy", "colorful", "big"] },
  { question: `The story ended.`, words: ["funny", "exciting", "happy", "strange"] }
];

/* =========================================================
   RESULT SCREENS
   Replace the `src` values with your own image file paths/URLs.
   - "correct" pool: randomly chosen when the answer is right
     (includes a chance of poop too, per the requirements)
   - "wrong": always shown when the answer is wrong
   ========================================================= */
const CORRECT_RESULT_IMAGES = [
  { src: "images/yummyraindow.png", alt: "Yummy rainbow ice cream!" },
  { src: "images/yummystrawberry.png", alt: "Yummy strawberry ice cream!" },
  { src: "images/yummychocolate.png", alt: "Yummy chocolate ice cream!" },
  { src: "images/yummyblueberry.png", alt: "Yummy blueberry ice cream!" },
  { src: "images/yucky.png", alt: "Oh no, it's poop!" }
];

const WRONG_RESULT_IMAGE = { src: "images/yucky.png", alt: "Oh no, it's poop!" };

/* ========================================================= */

const TOTAL_CONES = 26;
const answeredCones = new Set();
let currentConeIndex = null;

const coneGrid = document.getElementById('coneGrid');
const progressEl = document.getElementById('progress');
const resetBtn = document.getElementById('resetBtn');

const questionOverlay = document.getElementById('questionOverlay');
const questionConeLabel = document.getElementById('questionConeLabel');
const questionText = document.getElementById('questionText');
const wordList = document.getElementById('wordList');
const judgeCorrectBtn = document.getElementById('judgeCorrectBtn');
const judgeWrongBtn = document.getElementById('judgeWrongBtn');

const resultOverlay = document.getElementById('resultOverlay');
const resultImageContainer = document.getElementById('resultImageContainer');
const resultCloseBtn = document.getElementById('resultCloseBtn');

// Cone SVG (simple two-scoop cone)
function coneSVG() {
  return `
  <svg class="cone-svg" viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg">
    <polygon points="32,78 14,34 50,34" fill="#E8A85C" stroke="#C97F2E" stroke-width="2"/>
    <line x1="20" y1="42" x2="34" y2="56" stroke="#C97F2E" stroke-width="1.5"/>
    <line x1="44" y1="42" x2="30" y2="56" stroke="#C97F2E" stroke-width="1.5"/>
    <line x1="17" y1="50" x2="29" y2="62" stroke="#C97F2E" stroke-width="1.5"/>
    <line x1="47" y1="50" x2="35" y2="62" stroke="#C97F2E" stroke-width="1.5"/>
    <ellipse cx="32" cy="34" rx="19" ry="14" fill="#F8B7C7" stroke="#E08FA6" stroke-width="2"/>
    <ellipse cx="32" cy="22" rx="14" ry="12" fill="#FCE0E8" stroke="#E08FA6" stroke-width="2"/>
  </svg>`;
}

function buildConeGrid() {
  coneGrid.innerHTML = '';
  for (let i = 1; i <= TOTAL_CONES; i++) {
    const btn = document.createElement('button');
    btn.className = 'cone-btn';
    btn.dataset.cone = i;
    btn.innerHTML = coneSVG() + `<span class="cone-number">${i}</span>`;
    btn.addEventListener('click', () => openQuestion(i));
    if (answeredCones.has(i)) btn.disabled = true;
    coneGrid.appendChild(btn);
  }
  updateProgress();
}

function updateProgress() {
  progressEl.textContent = `${answeredCones.size} / ${TOTAL_CONES} cones answered`;
}

function openQuestion(coneNum) {
  currentConeIndex = coneNum;
  const data = QUESTIONS[coneNum - 1];

  questionConeLabel.textContent = `Cone #${coneNum}`;
  questionText.textContent = data.question;

  wordList.innerHTML = '';
  data.words.forEach(word => {
    const chip = document.createElement('span');
    chip.className = 'word-chip';
    chip.textContent = word;
    wordList.appendChild(chip);
  });

  questionOverlay.classList.remove('hidden');
}

judgeCorrectBtn.addEventListener('click', () => handleJudgment(true));
judgeWrongBtn.addEventListener('click', () => handleJudgment(false));

function handleJudgment(isCorrect) {
  questionOverlay.classList.add('hidden');
  showResult(isCorrect);
}

function showResult(isCorrect) {
  let image;
  if (isCorrect) {
    image = CORRECT_RESULT_IMAGES[Math.floor(Math.random() * CORRECT_RESULT_IMAGES.length)];
  } else {
    image = WRONG_RESULT_IMAGE;
  }

  resultImageContainer.innerHTML = `
    <img class="result-image" src="${image.src}" alt="${image.alt}"
         onerror="this.outerHTML = '<div class=\\'result-image-placeholder\\'>Image missing: ${image.src}<br>(${image.alt})</div>'">
  `;

  resultOverlay.classList.remove('hidden');

  resultCloseBtn.onclick = () => {
    resultOverlay.classList.add('hidden');
    answeredCones.add(currentConeIndex);
    buildConeGrid();
  };
}

resetBtn.addEventListener('click', () => {
  answeredCones.clear();
  buildConeGrid();
});

buildConeGrid();
</script>
</body>
</html>
